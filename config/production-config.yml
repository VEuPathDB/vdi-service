$schema: https://veupathdb.github.io/vdi-service/schema/config.json

definitions:
  genomicsProjects: &genomicsProjects
  - AmoebaDB
  - CryptoDB
  - FungiDB
  - GiardiaDB
  - HostDB
  - MicrosporidiaDB
  - PiroplasmaDB
  - PlasmoDB
  - ToxoDB
  - TrichDB
  - TriTrypDB
  - VectorBase
  - VEuPathDB
  vdiSchemaPass: &vdiSchemaPass ${env:VDI_APPDB_SCHEMA_PASS}
  vdiControlSchema: &vdiControlSchema vdi_control_prod_${env:LOCATION_INDICATOR}
  vdiDataSchema: &vdiDataSchema vdi_datasets_prod_${env:LOCATION_INDICATOR}

containerCore:
  authentication:
    oauth:
      clientId: ${env:OAUTH_CLIENT_ID}
      clientSecret: ${env:OAUTH_CLIENT_SECRET}
      url: https://eupathdb.org/oauth
      keystoreFile: ${env:KEY_STORE_FILE}
      keystorePass: ${env:KEY_STORE_PASS_PHRASE}
    adminToken: ${env:ADMIN_AUTH_TOKEN}

vdi:
  ldap:
    servers: ${env:LDAP_SERVER}
    baseDn: ${env:DB_LOOKUP_BASE_DN}
  siteBuild: ${env:SITE_BUILD}
  objectStore:
    bucketName: vdi-prod
    host: ${env:S3_HOST}
    accessToken: ${env:S3_ACCESS_TOKEN}
    secretKey: ${env:S3_SECRET_KEY}
  rabbit:
    global:
      connection:
        host: ${env:GLOBAL_RABBIT_HOST}
        user: ${env:GLOBAL_RABBIT_USERNAME}
        pass: ${env:GLOBAL_RABBIT_PASSWORD}
      exchange:
        name: vdi-bucket-notifications
      queue:
        name: vdi-bucket-notifications
      routing:
        key: vdi-bucket-notifications
  kafka:
    servers:
    - kafka:9092
    listeners:
    - PLAINTEXT://kafka:9092
  cacheDb:
    user: vdi
    pass: ${env:CACHE_DB_PASSWORD}
    host: cache-db:5432
  plugins:
  - server: bigwig:80
    displayName: bigWig
    dataTypes:
    - name: bigwigfiles
      version: 1.0
    projectIds: *genomicsProjects
  - server: biom:80
    displayName: BIOM
    dataTypes:
    - name: biom
      version: 1.0
    projectIds:
    - MicrobiomeDB
  - server: genelist:80
    displayName: Gene List
    dataTypes:
    - name: lightweight
      version: 1.0
    projectIds: *genomicsProjects
  - server: isasimple:80
    displayName: ISA Study
    dataTypes:
    - name: isasimple
      version: 1.0
    projectIds:
    - ClinEpiDB
  - server: noop:80
    displayName: Lightweight
    dataTypes:
    - name: lightweight
      version: 1.0
  - server: phenotype:80
    displayName: Phenotype
    dataTypes:
    - name: phenotype
      version: 1.0
    projectIds: *genomicsProjects
  - server: rnaseq:80
    displayName: RNA-Seq
    dataTypes:
    - name: rnaseq
      version: 1.0
    projectIds: *genomicsProjects
  targetDbs:
  - targetName: AmoebaDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_AMOEBA}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: ClinEpiDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_CLINEPI}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: CryptoDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_CRYPTO}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: FungiDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_FUNGI}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: GiardiaDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_GIARDIA}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: HostDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_HOST}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: MicrobiomeDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_MICROBIOME}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: MicrosporidiaDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_MICROSPORIDIA}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: OrthoMCL
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_ORTHO}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: PiroplasmaDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_PIROPLASMA}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: PlasmoDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_PLASMO}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: ToxoDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_TOXO}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: TrichDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_TRICH}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: TriTrypDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_TRITRYP}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: VEuPathDB
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_UNIDB}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
  - targetName: VectorBase
    pass: *vdiSchemaPass
    ldapCn: ${env:LDAP_VECTOR}
    dataSchema: *vdiDataSchema
    controlSchema: *vdiControlSchema
